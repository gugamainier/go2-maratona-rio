<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GO2 — Painel de Operações</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Fundo com gradiente sutil */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(61,179,63,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(61,179,63,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: #242424;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
      position: relative;
      z-index: 1;
    }

    /* ── Logo GO2 ── */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .go2-logo {
      display: inline-block;
      margin-bottom: 16px;
    }

    .go2-logo svg {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 4px 16px rgba(61,179,63,0.35));
    }

    .logo-area h2 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .logo-area p {
      font-size: 15px;
      color: #ccc;
      font-weight: 400;
    }

    /* ── Divisor ── */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.08);
      margin: 28px 0;
    }

    /* ── Formulário ── */
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 7px;
    }

    .field { margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: #444; }
    input:focus {
      border-color: #3db33f;
      box-shadow: 0 0 0 3px rgba(61,179,63,.15);
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #3db33f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      margin-top: 4px;
      letter-spacing: .3px;
      box-shadow: 0 4px 20px rgba(61,179,63,.35);
    }
    .btn:hover {
      background: #45c447;
      box-shadow: 0 6px 24px rgba(61,179,63,.45);
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { background: #333; box-shadow: none; color: #666; cursor: not-allowed; }

    /* ── Erro ── */
    .error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .error.show { display: block; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: #444;
      line-height: 1.6;
    }

    .footer span {
      color: #3db33f;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-area">
      <div class="go2-logo">
        <!-- Logo GO2 em SVG — mesma tipografia arredondada e cor verde -->
        <svg viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- G -->
          <path d="M30 80C30 47.6 50.6 24 82 24C100 24 114 31.6 122 44L104 57.6C99.2 50.4 91.6 46 82 46C63.6 46 54 60.8 54 80C54 99.2 63.6 114 82 114C96 114 105.6 106.4 108.4 95.2H84V75.2H132V84C132 110 114 136 82 136C50.6 136 30 112.4 30 80Z" fill="#3db33f"/>
          <!-- O -->
          <path d="M148 80C148 47.6 168.8 24 200 24C231.2 24 252 47.6 252 80C252 112.4 231.2 136 200 136C168.8 136 148 112.4 148 80ZM228 80C228 60.8 216.4 46 200 46C183.6 46 172 60.8 172 80C172 99.2 183.6 114 200 114C216.4 114 228 99.2 228 80Z" fill="#3db33f"/>
          <!-- 2 -->
          <path d="M268 132L296 100C304 91.2 308 83.6 308 75.6C308 62.4 299.6 53.6 287.2 53.6C275.6 53.6 267.2 61.2 265.6 73.6L246.8 71.2C249.6 50 264.4 36 287.2 36C311.2 36 327.2 52 327.2 75.6C327.2 89.2 321.6 100.8 309.2 114L294 132H328V150H268V132Z" fill="#3db33f"/>
        </svg>
      </div>
      <h2>Painel de Operações</h2>
      <p>Rastreamento de Transporte Executivo</p>
    </div>

    <hr class="divider">

    <div class="error" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username"
               placeholder="seu.usuario"
               autocomplete="username"
               autocapitalize="none"
               required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••"
               autocomplete="current-password"
               required>
      </div>
      <button type="submit" class="btn" id="btn-login">Entrar</button>
    </form>

    <div class="footer">
      <span>GO2</span> · Sistema de Gestão de Eventos<br>
      Acesso restrito a usuários autorizados
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect || '/panel/';
        } else {
          errEl.textContent = data.error || 'Usuário ou senha inválidos.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Erro de conexão. Tente novamente.';
        errEl.classList.add('show');
      }

      btn.disabled = false;
      btn.textContent = 'Entrar';
    });
  </script>
</body>
</html>

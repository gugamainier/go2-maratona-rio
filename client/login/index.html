<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GO2 Maratona do Rio — Painel de Operações</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1b2a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .event-badge {
      display: inline-block;
      background: #0d47a1;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .logo-area h1 {
      font-size: 26px;
      font-weight: 800;
      color: #0d1b2a;
      line-height: 1.1;
    }

    .logo-area h1 span {
      color: #1565c0;
    }

    .logo-area p {
      margin-top: 6px;
      font-size: 13px;
      color: #607d8b;
    }

    .divider {
      border: none;
      border-top: 1px solid #eef2f7;
      margin: 28px 0;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #607d8b;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .field { margin-bottom: 18px; }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid #dde3ec;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #1a2332;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #1565c0; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }
    .btn:hover  { background: #1976d2; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { background: #90a4ae; cursor: not-allowed; }

    .error {
      background: #ffebee;
      border: 1px solid #ef9a9a;
      color: #c62828;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #90a4ae;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="event-badge">GO2 · Maratona do Rio</div>
      <h1>🚗 Transporte<span>RJ</span></h1>
      <p>Painel de Operações — Acesso restrito</p>
    </div>

    <hr class="divider">

    <div class="error" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username"
               placeholder="seu.usuario" autocomplete="username"
               autocapitalize="none" required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btn-login">Entrar</button>
    </form>

    <div class="footer">
      GO2 · Maratona do Rio de Janeiro 2024<br>
      Sistema de rastreamento de transporte executivo
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect || '/panel/';
        } else {
          errEl.textContent = data.error || 'Usuário ou senha inválidos.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Erro de conexão. Tente novamente.';
        errEl.classList.add('show');
      }

      btn.disabled = false;
      btn.textContent = 'Entrar';
    });
  </script>
</body>
</html>
